<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JASUTIM — Cek Saldo Nasabah</title>
  <style>
    :root {
      --primary: #1d7b4f;
      --primary-dark: #145538;
      --bg: #f5f8f4;
      --card: #ffffff;
      --text: #1d2b22;
      --muted: #66756c;
      --line: #d9e3dc;
      --danger: #b42318;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      background: linear-gradient(180deg, #eef7f1 0%, var(--bg) 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 520px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 14px 40px rgba(29, 43, 34, .08);
    }
    .logo {
      min-width: 72px;
      height: 72px;
      border-radius: 20px;
      background: var(--primary);
      color: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      margin-bottom: 18px;
      padding: 0 18px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.5;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      margin-bottom: 16px;
    }
    .captcha-wrap {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 12px;
      align-items: end;
    }
    .captcha-box {
      height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px dashed #b9d1c3;
      border-radius: 14px;
      background: #edf7f0;
      color: var(--primary-dark);
      font-weight: 800;
      margin-bottom: 16px;
    }
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 14px 18px;
      background: var(--primary);
      color: white;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { background: var(--primary-dark); }
    .error, .result {
      display: none;
      margin-top: 18px;
      border-radius: 16px;
      padding: 16px;
    }
    .error {
      background: #fef3f2;
      color: var(--danger);
      border: 1px solid #fecdca;
    }
    .result {
      background: #f8fbf9;
      border: 1px solid #d9e3dc;
    }
    .row { margin-bottom: 14px; }
    .row:last-child { margin-bottom: 0; }
    .meta {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 4px;
    }
    .value {
      font-size: 24px;
      font-weight: 800;
    }
    .small {
      font-size: 18px;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="logo">BS JASUTIM</div>
    <h1>Cek Saldo Nasabah</h1>
    <p>Masukkan nomor rekening untuk melihat total tonase dan saldo Anda secara mandiri.</p>

    <form id="saldo-form">
      <label for="no_rek">Nomor Rekening</label>
      <input id="no_rek" placeholder="Contoh: 001-BSJ-04-2026" autocomplete="off" />

      <div class="captcha-wrap">
        <div>
          <label for="captcha_answer">Verifikasi</label>
          <input id="captcha_answer" placeholder="Jawaban" autocomplete="off" />
        </div>
        <div class="captcha-box">{{ captcha.a }} + {{ captcha.b }} = ?</div>
      </div>

      <button type="submit">Cek Saldo</button>
    </form>

    <div class="error" id="error-box"></div>

    <div class="result" id="result-box">
      <div class="row">
        <span class="meta">Nama Nasabah</span>
        <span class="value small" id="result-name">-</span>
      </div>
      <div class="row">
        <span class="meta">Nomor Rekening</span>
        <span class="value small" id="result-rek">-</span>
      </div>
      <div class="row">
        <span class="meta">Total Tonase</span>
        <span class="value" id="result-kg">-</span>
      </div>
      <div class="row">
        <span class="meta">Saldo Saat Ini</span>
        <span class="value" id="result-rp">-</span>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('saldo-form');
    const errorBox = document.getElementById('error-box');
    const resultBox = document.getElementById('result-box');
    const captchaExpected = '{{ captcha.answer }}';

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';
      resultBox.style.display = 'none';

      const res = await fetch('/api/check-saldo', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          no_rek: document.getElementById('no_rek').value,
          captcha_answer: document.getElementById('captcha_answer').value,
          captcha_expected: captchaExpected,
        })
      });

      const json = await res.json();
      if (!res.ok || !json.ok) {
        errorBox.textContent = json.error || 'Terjadi kesalahan.';
        errorBox.style.display = 'block';
        return;
      }

      document.getElementById('result-name').textContent = json.data.nama;
      document.getElementById('result-rek').textContent = json.data.no_rek;
      document.getElementById('result-kg').textContent = `${json.data.total_kg} Kg`;
      document.getElementById('result-rp').textContent = json.data.total_rp;
      resultBox.style.display = 'block';
    });
  </script>
</body>
</html>
